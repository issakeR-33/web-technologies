<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крамниця товарів</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
<header>
  <div class="header-left">
    <button class="burger-btn" id="js-burger-btn" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
    <span class="site-title">Крамниця</span>
  </div>
</header>

<!-- ═══ BLUR OVERLAY ════════════════════════════════════════════════════ -->
<div class="layout-blur-overlay" id="js-blur-overlay"></div>

<!-- ═══ MAIN LAYOUT ═══════════════════════════════════════════════════════ -->
<div class="layout">

  <!-- Aside drawer: filters + sort -->
  <aside id="js-aside">
    <div class="aside-header">
      <h1>Фільтри та сортування</h1>
      <button class="aside-close-btn" id="js-aside-close" aria-label="Закрити">✕</button>
    </div>
    <div class="aside-body">

      <div class="aside-section">
        <h2>Категорія</h2>
        <div class="filter-buttons" id="js-filter-buttons"></div>
        <button class="reset-btn" id="js-reset-filter">Скинути фільтр</button>
      </div>

      <div class="aside-section">
        <h2>Сортування</h2>
        <div class="sort-buttons">
          <button class="sort-btn" data-sort="price">За ціною</button>
          <button class="sort-btn" data-sort="createdAt">За датою створення</button>
          <button class="sort-btn" data-sort="updatedAt">За датою оновлення</button>
        </div>
        <button class="reset-btn" id="js-reset-sort">Скинути сортування</button>
      </div>

    </div>
  </aside>

  <!-- Controls bar -->
  <div class="controls-bar">
    <span class="product-count" id="js-product-count">Товарів: 0</span>
    <button class="add-btn" id="js-add-btn">+ Додати товар</button>
  </div>

  <!-- Product list -->
  <section class="products-section">
    <div class="empty-state visible" id="js-empty-state">
      <p>Наразі список товарів пустий.<br>Додайте новий товар.</p>
    </div>
    <ul id="js-product-list" role="list"></ul>
  </section>

</div>

<!-- ═══ FOOTER ══════════════════════════════════════════════════════════ -->
<footer>
  <span>Загальна Сума : <span id="js-total-price">0</span> грн</span>
</footer>

<!-- ═══ MODAL ════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" id="js-modal-backdrop"
     role="dialog" aria-modal="true" aria-labelledby="js-modal-title">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="js-modal-title">Новий товар</span>
      <button class="modal-close" id="js-modal-close" aria-label="Закрити">✕</button>
    </div>
    <form id="js-product-form" novalidate>
      <div class="modal-body">
        <input type="hidden" id="js-edit-id" />

        <div class="form-group">
          <label for="js-f-name">Назва товару *</label>
          <input id="js-f-name" name="productName" type="text"
                 placeholder="Наприклад: Навушники" required minlength="2" />
        </div>

        <div class="form-group">
          <label for="js-f-price">Ціна (грн) *</label>
          <input id="js-f-price" name="productPrice" type="number"
                 placeholder="0" required min="0" step="0.01" />
        </div>

        <div class="form-group">
          <label for="js-f-category">Категорія *</label>
          <select id="js-f-category" name="productCategory" required>
            <option value="">-- Оберіть категорію --</option>
            <option value="Електроніка">Електроніка</option>
            <option value="Одяг">Одяг</option>
            <option value="Продукти">Продукти</option>
            <option value="Книги">Книги</option>
            <option value="Спорт">Спорт</option>
          </select>
        </div>

        <div class="form-group">
          <label for="js-f-image">URL зображення *</label>
          <input id="js-f-image" name="productImage" type="url"
                 placeholder="https://…" required />
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" id="js-modal-cancel">Скасувати</button>
        <button type="submit" class="btn-submit">Зберегти</button>
      </div>
    </form>
  </div>
</div>

<!-- ═══ SNACKBAR ═════════════════════════════════════════════════════════ -->
<div id="js-snackbar-container" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
